<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF ID BAN CHECKER | CKRPRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap');

        body {
            background: linear-gradient(180deg, #fbc2eb 0%, #a6c1ee 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* तस्बिरको जस्तै मुख्य Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 35px 25px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input Field - Soft & Clean */
        .input-box {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 14px 20px;
            width: 100%;
            margin-bottom: 15px;
            color: #444;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-box:focus {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.2);
        }

        /* Blue Button - Exact like your Image */
        .check-btn {
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 14px;
            width: 100%;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
        }

        .check-btn:hover {
            background: #0063ce;
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.4);
        }

        .check-btn:active {
            transform: scale(0.96);
        }

        /* Terminal Styling */
        .terminal-header {
            background: #252526;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            padding: 10px 15px;
            display: flex;
            gap: 7px;
            margin-top: 25px;
            align-items: center;
        }

        .dot { width: 11px; height: 11px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .terminal-window {
            background: #1e1e1e;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            padding: 18px;
            color: #d4d4d4;
            font-family: 'Fira Code', monospace;
            min-height: 180px;
            text-align: left;
            font-size: 13px;
            line-height: 1.5;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .cursor {
            display: inline-block;
            width: 7px;
            height: 15px;
            background: #00ff00;
            margin-left: 5px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #777;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h2 class="text-[#333] font-bold text-xl mb-6">FF BAN CHECKER</h2>

    <input type="number" id="player_id" class="input-box" placeholder="Enter Player UID" autocomplete="off">
    
    <button onclick="checkId()" class="check-btn">CHECK PLAYER</button>

    <div class="terminal-header">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <span class="text-[10px] text-gray-400 ml-2 font-mono">system_terminal</span>
    </div>
    <div class="terminal-window" id="terminal_out">
        <span class="text-green-400">Ready for input ...</span><span class="cursor"></span>
    </div>

    <div class="footer-text">
        BY CKRPRO ULTIMATE | <span class="text-blue-600">YouTube: CKR UNKNOWN</span>
    </div>
</div>

<script>
    async function checkId() {
        const uid = document.getElementById('player_id').value;
        const out = document.getElementById('terminal_out');

        if (!uid) {
            out.innerHTML = '<span class="text-red-400">Error: Please enter UID first!</span>';
            return;
        }

        // Loading Animation
        out.innerHTML = `> Initiating scan...<br>> Targeting UID: ${uid}<br>> Fetching API status... <span class="cursor"></span>`;

        try {
            // API Call
            const response = await fetch(`https://amin-team-api.vercel.app/check_banned?player_id=${uid}`);
            const data = await response.json();

            // नतिजा देखाउन अलिकति ढिलो गर्ने (Real जस्तो बनाउन)
            setTimeout(() => {
                if(data.is_banned) {
                    out.innerHTML = `
                        <span class="text-blue-400">> Connection Success.</span><br>
                        <span class="text-white">> Player ID: ${uid}</span><br>
                        <span class="text-red-500 font-bold">> STATUS: BANNED ❌</span><br>
                        <span class="text-gray-500">> Reason: Account Suspended.</span><br>
                        <span class="text-yellow-400">> CKRPRO Scan Complete.</span>
                    `;
                } else {
                    out.innerHTML = `
                        <span class="text-blue-400">> Connection Success.</span><br>
                        <span class="text-white">> Player ID: ${uid}</span><br>
                        <span class="text-green-400 font-bold">> STATUS: SAFE / NO BAN ✅</span><br>
                        <span class="text-gray-500">> Device: Verified.</span><br>
                        <span class="text-yellow-400">> CKRPRO Scan Complete.</span>
                    `;
                }
            }, 1500);

        } catch (err) {
            out.innerHTML = '<span class="text-red-500">> SERVER ERROR: API Not Responding!</span>';
        }
    }
</script>

</body>
</html>
