<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF BAN CHECK</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, sans-serif;
    background: linear-gradient(135deg,#d9a7c7,#fffcdc);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN CARD */
.card {
    width: 100%;
    max-width: 340px;
    padding: 18px;
    border-radius: 25px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(18px);
    box-shadow: 0 10px 35px rgba(0,0,0,0.2);
}

/* TITLE */
.title {
    text-align: center;
    color: #007aff;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 15px;
}

/* INPUT */
.input-box {
    width: 100%;
    margin-bottom: 12px;
}

input {
    width: 100%;
    height: 48px;
    border-radius: 14px;
    border: none;
    padding: 0 14px;
    font-size: 15px;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    height: 48px;
    border-radius: 14px;
    border: none;
    background: #007aff;
    color: white;
    font-size: 15px;
    font-weight: bold;
}

/* TERMINAL */
.terminal {
    margin-top: 15px;
    width: 100%;
    height: 130px;
    background: #0b0b0b;
    color: #00ff88;
    border-radius: 14px;
    padding: 12px;
    font-size: 13px;
    font-family: monospace;
    overflow-y: auto;
    white-space: pre-line;
}

/* MOBILE FIX */
@media (max-width: 400px) {
    .card {
        max-width: 92%;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="title">FF BAN CHECK</div>

    <div class="input-box">
        <input type="number" id="uid" placeholder="Enter UID">
    </div>

    <button onclick="checkBan()">CHECK STATUS</button>

    <div class="terminal" id="terminal">
> Ready...
    </div>

</div>

<script>
function checkBan() {
    let uid = document.getElementById("uid").value;
    let terminal = document.getElementById("terminal");

    if (!uid) {
        terminal.innerHTML = "> ❌ Enter UID first";
        return;
    }

    terminal.innerHTML = "> Checking...\n";

    fetch("/check", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "uid=" + uid
    })
    .then(res => res.text())
    .then(data => {
        terminal.innerHTML += "> Result:\n" + data;
    })
    .catch(() => {
        terminal.innerHTML += "> ❌ Failed";
    });
}
</script>

</body>
</html>
