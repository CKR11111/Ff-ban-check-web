<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKRPRO BAN CHECK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Poppins:wght@400;600&display=swap');
        body {
            background: linear-gradient(180deg, #fbc2eb 0%, #a6c1ee 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif; margin: 0; padding: 10px;
        }
        .compact-card {
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px);
            border-radius: 30px; padding: 30px 20px; width: 100%; max-width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.4); text-align: center;
        }
        .banner {
            font-family: 'Rajdhani', sans-serif; font-size: 24px; color: #007AFF;
            text-transform: uppercase; margin-bottom: 20px;
        }
        .input-box {
            background: #fff; border: none; border-radius: 12px;
            padding: 12px; width: 100%; font-size: 16px; margin-bottom: 12px; outline: none;
        }
        .check-btn {
            background: #007AFF; color: white; border-radius: 12px;
            padding: 12px; width: 100%; font-weight: bold; transition: 0.2s;
        }
        .terminal {
            background: #121212; border-radius: 15px; margin-top: 20px; overflow: hidden;
            text-align: left; font-family: monospace; font-size: 13px;
        }
        .term-body { padding: 15px; color: #00ff00; min-height: 120px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px;}
    </style>
</head>
<body>

<div class="compact-card">
    <div class="banner">CKRPRO BAN CHECK</div>
    <input type="number" id="uid" class="input-box" placeholder="ENTER UID HERE">
    <button onclick="checkNow()" class="check-btn" id="btnText">CHECK STATUS</button>

    <div class="terminal">
        <div style="background:#1e1e1e; padding:5px 15px;">
            <div class="dot" style="background:#ff5f56"></div>
            <div class="dot" style="background:#ffbd2e"></div>
            <div class="dot" style="background:#27c93f"></div>
        </div>
        <div class="term-body" id="log">Ready to scan...</div>
    </div>
    <p style="font-size: 10px; margin-top: 15px; color: #555;">BY CKRPRO | YOUTUBE: CKR UNKNOWN</p>
</div>

<script>
    async function checkNow() {
        const uid = document.getElementById('uid').value;
        const log = document.getElementById('log');
        const btn = document.getElementById('btnText');

        if(!uid) { log.innerHTML = "❌ Please enter UID!"; return; }

        log.innerHTML = "> Scanning ID: " + uid + "...<br>> Requesting Server...";
        btn.disabled = true; btn.style.opacity = "0.5";

        try {
            const response = await fetch('/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({player_id: uid})
            });
            
            const data = await response.json();
            
            setTimeout(() => {
                if(data.is_banned === true) {
                    log.innerHTML = "> ID: "+uid+"<br>> STATUS: <span style='color:red'>BANNED ❌</span><br>> Done.";
                } else if(data.is_banned === false) {
                    log.innerHTML = "> ID: "+uid+"<br>> STATUS: <span style='color:#00ff00'>SAFE ✅</span><br>> Done.";
                } else {
                    log.innerHTML = "> Server Busy.<br>> Status: <span style='color:yellow'>NOT FOUND</span><br>> Try again later.";
                }
                btn.disabled = false; btn.style.opacity = "1";
            }, 1000);

        } catch(e) {
            log.innerHTML = "❌ Connection Failed!";
            btn.disabled = false; btn.style.opacity = "1";
        }
    }
</script>
</body>
</html>
