<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKRPRO BAN CHECK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Poppins:wght@400;600&display=swap');
        body {
            background: linear-gradient(180deg, #fbc2eb 0%, #a6c1ee 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif; margin: 0; padding: 10px;
        }
        .compact-card {
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 30px 20px; width: 100%; max-width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.5); text-align: center;
        }
        .banner {
            font-family: 'Rajdhani', sans-serif; font-size: 24px; color: #007AFF;
            text-transform: uppercase; margin-bottom: 20px; font-weight: 800;
        }
        .input-box {
            background: rgba(255, 255, 255, 0.9); border: none; border-radius: 12px;
            padding: 14px; width: 100%; font-size: 16px; margin-bottom: 15px; outline: none;
        }
        .check-btn {
            background: #007AFF; color: white; border-radius: 12px;
            padding: 14px; width: 100%; font-weight: bold; transition: 0.3s;
        }
        .terminal {
            background: #1a1a1a; border-radius: 15px; margin-top: 20px; overflow: hidden;
            text-align: left; font-family: monospace; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .term-body { padding: 18px; color: #00ff00; min-height: 130px; font-size: 13px; line-height: 1.6; }
        .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="compact-card">
    <div class="banner">CKRPRO BAN CHECK</div>
    <input type="number" id="uid" class="input-box" placeholder="Enter Player UID">
    <button onclick="checkNow()" class="check-btn" id="btn">CHECK STATUS</button>

    <div class="terminal">
        <div style="background:#2d2d2d; padding:8px 15px;">
            <div class="dot" style="background:#ff5f56"></div>
            <div class="dot" style="background:#ffbd2e"></div>
            <div class="dot" style="background:#27c93f"></div>
        </div>
        <div class="term-body" id="log">> Ready for input ...</div>
    </div>
    <p style="font-size: 10px; margin-top: 20px; color: #555; font-weight: 600;">BY CKRPRO | YOUTUBE: CKR UNKNOWN</p>
</div>

<script>
    async function checkNow() {
        const uid = document.getElementById('uid').value;
        const log = document.getElementById('log');
        const btn = document.getElementById('btn');

        if(!uid) { log.innerHTML = "<span style='color:#ff5f56'>> Error: UID halnus!</span>"; return; }

        log.innerHTML = "> Scanning UID: " + uid + "...<br>> Connecting to API...<br>> Fetching Data...";
        btn.disabled = true; btn.style.opacity = "0.6";

        try {
            const response = await fetch('/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({player_id: uid})
            });
            const data = await response.json();
            
            setTimeout(() => {
                // API response check (status: "NOT BANNED" or "BANNED")
                if(data.status) {
                    let isBanned = data.status.includes("NOT BANNED") ? false : true;
                    let color = isBanned ? "#ff5f56" : "#00ff00";
                    let resultText = isBanned ? "BANNED ❌" : "SAFE ✅";
                    
                    log.innerHTML = `
                        > Connection Secure.<br>
                        > Player: ${data.player_name || 'Unknown'}<br>
                        > Region: ${data.region || 'Unknown'}<br>
                        > Status: <span style="color:${color}; font-weight:bold;">${resultText}</span><br><br>
                        > Done.
                    `;
                } else {
                    log.innerHTML = "> <span style='color:#ff5f56'>Error: Invalid ID</span>";
                }
                btn.disabled = false; btn.style.opacity = "1";
            }, 1000);
        } catch(e) {
            log.innerHTML = "> <span style='color:#ff5f56'>Server Connection Failed!</span>";
            btn.disabled = false; btn.style.opacity = "1";
        }
    }
</script>
</body>
</html>
